name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build (${{ matrix.goos }}-${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          bin_name="duck-dns-changer"
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            ext=".exe"
          fi

          output="dist/${bin_name}_${{ matrix.goos }}_${{ matrix.goarch }}${ext}"
          CGO_ENABLED=0 GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" \
            go build -trimpath -ldflags="-s -w" -o "${output}" ./cmd

          if [ "${{ matrix.goos }}" = "linux" ]; then
            package_dir="$(mktemp -d)"
            install -m 0755 "${output}" "${package_dir}/${bin_name}"
            install -m 0644 "deploy/systemd/${bin_name}.service" "${package_dir}/${bin_name}.service"
            install -m 0644 "deploy/systemd/${bin_name}.timer" "${package_dir}/${bin_name}.timer"
            install -m 0755 "scripts/install-release-linux.sh" "${package_dir}/install.sh"
            tar -C "${package_dir}" -czf "dist/${bin_name}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz" .
            rm -rf "${package_dir}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: duck-dns-changer-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Collect release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find dist -type f -name "duck-dns-changer*" -exec cp "{}" release-assets/ \;

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          fail_on_unmatched_files: true
